<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator by BAM</title>
    <style>
        html,
        body {
            margin: 0;
            background-color: rgb(132, 196, 196);
            padding: 0;
        }

        div[id="Calculator Pad"] {
            background-color: rgb(102, 15, 160);
            text-align: center;
            margin-top: 80px;
        }

        .Operation {
            display: inline;
            height: 25px;
            width: 45px;
            padding: 2px;

        }

        .Row1 {
            display: inline;
            button {
                font-size : 25px;
            }
        }

        .Row2 {
            display: inline;
            button {
                font-size : 25px;
            }
        }

        .Row3 {
            display: inline;
            button {
                font-size : 25px;
            }
        }

        .Row4 {
            display: inline;
            button {
                font-size : 25px;
            }
        }
        button {
            transition:0.3s ;
            cursor: pointer;
        }
        button:hover {
            transform: scale(1.08);
            box-shadow: 0 0 15px white;
        }


    </style>

</head>


<body>
    <header>

    </header>
    <main>
        <div id="Calculator Pad" style="justify-content: center; align-items: center;height: auto;
            border-radius: 50px; width:50%; margin-left: 25%;">
            <div style="justify-content: center; align-items: center;display:flex;">
                <input type="text" id="display" readonly style="background-color: rgb(130, 234, 238); height:80px; width: 400px; margin-left: 100px;
                font-size:25px;">

                <div class="Operation" id="x" style="width: 100px; height:80px ; margin-bottom : 50px;">
                <button onclick="Backspace()"
                    style="height: 80px;background-color: aqua; width: 80px;margin-top: 25px; font-size:15px ; justify-content: center; text-align: center;">x</button>
                </div>
            </div>
            <br>
            <div class="Operation" id="C">
                <button onclick="clearDisplay()" style="height: 80px; width: 100px;margin-left: 208px;background-color: aqua ; 
                font-size: 24px;">C</button>
            </div>
            <div class="Operation" id="=">
                <button onclick="calculate()" style="height: 80px ; width: 100px; font-size:24px ;background-color: aqua;">=</button>
            </div>
            <br>
            <div class="Row1" id="1">
                <button onclick="appendToDisplay('1')" style="height: 80px; width: 100px; margin-top: 3px;background-color: rgb(247, 23, 191);">1</button>
            </div>
            <div class="Row1" id="2">
                <button onclick="appendToDisplay('2')" style="height: 80px; width: 100px;background-color:rgb(247, 23, 191)">2</button>
            </div>
            <div class="Row1" id="3">
                <button onclick="appendToDisplay('3')" style="height: 80px; width: 100px;background-color: rgb(247, 23, 191)">3</button>
            </div>
            <div class="Row1" id="+">
                <button onclick="appendToDisplay('+')" style="height: 80px; width: 100px; background-color: aqua;">+</button>
            </div>

            <br>

            <div class="Row2" id="4">
                <button onclick="appendToDisplay('4')" style="height: 80px; width: 100px;background-color: rgb(247, 23, 191);">4</button>
            </div>
            <div class="Row2" id="5">
                <button onclick="appendToDisplay('5')" style="height: 80px; width: 100px;background-color: rgb(247, 23, 191);">5</button>
            </div>
            <div class="Row2" id="6">
                <button onclick="appendToDisplay('6')" style="height: 80px; width: 100px;background-color: rgb(247, 23, 191);">6</button>
            </div>
            <div class="Row2" id="-">
                <button onclick="appendToDisplay('-')" style="height: 80px; width: 100px; background-color: aqua;">-</button>
            </div>

            <br>

            <div class="Row3" id="7">
                <button onclick="appendToDisplay('7')" style="height: 80px; width: 100px;background-color: rgb(247, 23, 191);">7</button>
            </div>
            <div class="Row3" id="8">
                <button onclick="appendToDisplay('8')" style="height: 80px; width: 100px;background-color: rgb(247, 23, 191);">8</button>
            </div>
            <div class="Row3" id="9">
                <button onclick="appendToDisplay('9')" style="height: 80px; width: 100px;background-color: rgb(247, 23, 191);">9</button>
            </div>
            <div class="Row3" id="X">
                <button onclick="appendToDisplay('*')" style="height: 80px; width: 100px; background-color: aqua;">X</button>
            </div>

            <br>

            <div class="Row4" id="0">
                <button onclick="appendToDisplay('0')" style="height: 80px; width: 100px;margin-left: 105px; background-color: rgb(247, 23, 191);">0</button>
            </div>
            <div class="Row4" id=".">
                <button onclick="appendToDisplay('.')" style="height: 80px; width: 100px;background-color: rgb(247, 23, 191);">.</button>
            </div>
            <div class="Row4" id="/">
                <button onclick="appendToDisplay('/')" style=" height:80px; width: 100px;background-color: aqua;">/</button>
            </div>
        </div>
    </main>
    <footer>

    </footer>
    <script>
        function appendToDisplay(value) {
            document.getElementById("display").value += value;
        }
        function clearDisplay() {
            document.getElementById('display').value = '';
        }
        function calculate() {
            var expression = document.getElementById('display').value;
            try {
                var result = eval(expression);
                document.getElementById('display').value = result;
            } catch (error) {
                document.getElementById('display').value = 'Error';
            }
        }
        function Backspace() {
            var currentValue = document.getElementById('display').value;
            document.getElementById('display').value = currentValue.slice(0, -1);
        }

    </script>
</body>


</html>
